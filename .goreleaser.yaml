version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-manager
    main: ./cmd/agent-manager
    binary: agent-manager
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: alexmosquera
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: agent-manager-pro
    homepage: "https://github.com/alexmosquera/agent-manager-pro"
    description: "CLI tool that standardizes AI coding agent environments across a team"
    license: "MIT"
    install: |
      bin.install "agent-manager"
    test: |
      system "#{bin}/agent-manager", "version"

release:
  github:
    owner: alexmosquera
    name: agent-manager-pro
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
