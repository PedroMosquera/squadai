version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: squadai
    main: ./cmd/squadai
    binary: squadai
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    # Windows archives use zip; all other platforms use tar.gz.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

# Linux native packages: deb (apt/Debian/Ubuntu) and rpm (dnf/Fedora/RHEL).
# Built from the same Linux binaries produced above. Published as release assets.
nfpms:
  - id: packages
    package_name: squadai
    vendor: PedroMosquera
    homepage: "https://github.com/PedroMosquera/squadai"
    maintainer: "Pedro Mosquera"
    description: "CLI tool that standardizes AI coding agent environments across a team"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publishing.
# Requires the HOMEBREW_TAP_GITHUB_TOKEN GitHub Actions secret (a fine-scoped
# PAT with write access to PedroMosquera/homebrew-tap) and the tap repository
# to exist before this runs.
brews:
  - repository:
      owner: PedroMosquera
      name: homebrew-tap
      # HOMEBREW_TAP_GITHUB_TOKEN secret must be set in GitHub Actions for publishing.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: squadai
    homepage: "https://github.com/PedroMosquera/squadai"
    description: "CLI tool that standardizes AI coding agent environments across a team"
    license: "MIT"
    install: |
      bin.install "squadai"
    test: |
      system "#{bin}/squadai", "version"

release:
  github:
    owner: PedroMosquera
    name: squadai
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
