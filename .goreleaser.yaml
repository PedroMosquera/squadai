version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-manager
    main: ./cmd/agent-manager
    binary: agent-manager
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publishing.
# Requires the HOMEBREW_TAP_TOKEN GitHub Actions secret and the
# PedroMosquera/homebrew-tap repository to exist before this runs.
brews:
  - repository:
      owner: PedroMosquera
      name: homebrew-tap
      # HOMEBREW_TAP_TOKEN secret must be set in GitHub Actions for publishing.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: agent-manager
    homepage: "https://github.com/PedroMosquera/agent-manager-pro"
    description: "CLI tool that standardizes AI coding agent environments across a team"
    license: "MIT"
    install: |
      bin.install "agent-manager"
    test: |
      system "#{bin}/agent-manager", "version"

release:
  github:
    owner: PedroMosquera
    name: agent-manager-pro
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
